detector_model: RF1105
scintillator: NaI(Tl)
crystal_diameter_mm: 75
crystal_height_mm: 75
crystal_density_g_cm3: 3.67
scintillation_decay_ns: 250
scintillation_light_yield_ph_per_keV: 38.0
pmt_model: CR119
pmt_rise_time_ns: 8
pmt_gain_default: 2.73e5
pmt_hv_operating_min_v: 450
pmt_hv_operating_max_v: 1000
preamp_supply_v: -12
anode_output_polarity: positive
dynode_output_polarity: positive

physics:
  source_mode: downward_tgf_mvp
  source_energy_keV: 662.0
  primary_particle: gamma
  events_for_demo: 20000

tgf_source:
  enabled: true
  source_altitude_m: 1000.0
  cone_half_angle_deg: 5.0
  spectrum_model: expcut_powerlaw
  alpha: 1.0
  Ec_MeV: 7.3
  Emin_MeV: 0.2
  Emax_MeV: 40.0
  burst_duration_us: 100.0
  timing_mode: none
  world_half_height_m: 2.0
  world_half_width_m: 0.5

geometry:
  include_optional_housing: true
  housing_inner_diameter_mm: 80
  housing_outer_diameter_mm: 86
  housing_height_mm: 79
  reflector_material: MgO

python_engine:
  arrival_mode: auto
  rate_sweep_cps:
    - 1.0e5
    - 5.0e5
    - 1.0e6
  default_rate_cps: 1.0e4
  simulation_window_us: 5000.0
  sample_period_ns: 10.0
  pulse_kernel_length_ns: 2500.0
  waveform_preview_short_us: 5.0
  waveform_preview_long_us: 500.0
  rng_seed: 1105
  quantum_efficiency: 0.25
  elementary_charge_c: 1.602e-19
  resample_edep_library: true

probe_output_model:
  dc_gain: 1.0
  transimpedance_ohm: 220.0
  high_pass_tau_us: 40.0
  low_pass_tau_ns: 60.0
  source_resistance_ohm: 50.0
  external_load_ohm: null
  output_capacitance_pf: 15.0

dynode_output_model:
  enabled: false
  dc_gain: 1.0
  transimpedance_ohm: 56.0
  high_pass_tau_us: 4.0
  low_pass_tau_ns: 12.0
  source_resistance_ohm: 50.0
  external_load_ohm: 50.0
  output_capacitance_pf: 8.0

synthetic_edep:
  num_events: 20000
  photopeak_fraction: 0.55
  photopeak_mean_keV: 662.0
  photopeak_sigma_keV: 18.0
  continuum_min_keV: 20.0
  continuum_max_keV: 478.0
  escape_fraction: 0.08
  escape_mean_keV: 540.0
  escape_sigma_keV: 20.0
